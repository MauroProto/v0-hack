  <style>/* VibeShield — premium dark SaaS */
:root {
  --bg: #09090B;
  --bg-1: #0C0C0F;
  --bg-2: #111114;
  --bg-3: #17171C;
  --line: rgba(255, 255, 255, 0.07);
  --line-2: rgba(255, 255, 255, 0.12);
  --line-strong: rgba(255, 255, 255, 0.18);
  --fg: #F4F4F5;
  --fg-2: #D4D4D8;
  --fg-3: #A1A1AA;
  --fg-4: #71717A;
  --fg-5: #52525B;

  /* accent — refined mint (not neon) */
  --accent: #7FE7C4;
  --accent-2: #4FD1A8;
  --accent-ink: #062016;
  --accent-soft: rgba(127, 231, 196, 0.12);

  --danger: #F87171;
  --danger-soft: rgba(248, 113, 113, 0.12);
  --warn: #F5B56C;
  --warn-soft: rgba(245, 181, 108, 0.12);
  --info: #93C5FD;
  --info-soft: rgba(147, 197, 253, 0.12);

  --font-sans: "Geist", "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-serif: "Instrument Serif", "Times New Roman", serif;
  --font-mono: "JetBrains Mono", "Geist Mono", ui-monospace, monospace;

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;

  --maxw: 1200px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { background: var(--bg); color: var(--fg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body {
  background:
    radial-gradient(1200px 600px at 50% -100px, rgba(127, 231, 196, 0.07), transparent 60%),
    radial-gradient(800px 400px at 90% 10%, rgba(127, 231, 196, 0.04), transparent 60%),
    var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
}

/* grain */
body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.035;
  mix-blend-mode: overlay;
  background-image: none;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
img { max-width: 100%; display: block; }

/* typography base */
.display {
  font-family: var(--font-sans);
  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 0.98;
}
.display em, .serif {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.02em;
}
.eyebrow {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-4);
  font-weight: 500;
}
.mono { font-family: var(--font-mono); }

/* layout */
.wrap {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 0 32px;
}

/* Nav */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  background: transparent;
  border-bottom: 1px solid transparent;
  transition: background .2s ease, border-color .2s ease, backdrop-filter .2s ease;
}
.nav.is-scrolled {
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  background: rgba(9, 9, 11, 0.72);
  border-bottom-color: var(--line);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 500; letter-spacing: -0.01em; }
.brand-mark {
  width: 22px; height: 22px; border-radius: 6px;
  background: linear-gradient(160deg, var(--accent), var(--accent-2));
  display: grid; place-items: center;
  color: var(--accent-ink);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25), 0 2px 10px rgba(127, 231, 196, 0.2);
}
.brand-mark svg { width: 12px; height: 12px; }

.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a { color: var(--fg-3); font-size: 13.5px; transition: color .15s; }
.nav-links a:hover { color: var(--fg); }
.nav-right { display: flex; align-items: center; gap: 10px; }

/* buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 34px;
  padding: 0 14px;
  border-radius: 8px;
  font-size: 13.5px;
  font-weight: 500;
  letter-spacing: -0.005em;
  border: 1px solid transparent;
  transition: all .15s ease;
  white-space: nowrap;
}
.btn-primary {
  background: var(--fg);
  color: #0A0A0B;
  border-color: var(--fg);
}
.btn-primary:hover { background: #fff; }
.btn-ghost {
  background: transparent;
  color: var(--fg-2);
  border-color: transparent;
}
.btn-ghost:hover { color: var(--fg); }
.btn-outline {
  background: transparent;
  color: var(--fg-2);
  border-color: var(--line-2);
}
.btn-outline:hover { border-color: var(--line-strong); color: var(--fg); }
.btn-accent {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: var(--accent);
}
.btn-accent:hover { background: #92ecd0; }
.btn-lg { height: 42px; padding: 0 18px; font-size: 14px; border-radius: 10px; }

.btn .arrow { transition: transform .2s ease; }
.btn:hover .arrow { transform: translateX(2px); }

/* pill / badge */
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  height: 26px;
  padding: 0 10px 0 8px;
  border: 1px solid var(--line-2);
  border-radius: 999px;
  background: rgba(255,255,255,0.02);
  font-size: 12px;
  color: var(--fg-2);
}
.pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* Hero */
.hero { padding: 88px 0 40px; position: relative; }
.hero-inner { max-width: 860px; }
.hero h1 {
  font-size: clamp(48px, 7vw, 92px);
  margin: 18px 0 0;
}
.hero h1 .line { display: block; }
.hero h1 .muted { color: var(--fg-4); }
.hero h1 em { color: var(--fg); }
.hero p.lead {
  margin: 28px 0 0;
  color: var(--fg-3);
  font-size: 17px;
  line-height: 1.55;
  max-width: 560px;
}
.hero-cta { margin-top: 32px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.hero-meta {
  margin-top: 40px;
  display: flex; align-items: center; gap: 24px;
  font-size: 12.5px; color: var(--fg-4);
}
.hero-meta .sep { width: 1px; height: 12px; background: var(--line-2); }
.hero-meta b { color: var(--fg-2); font-weight: 500; }

/* subtle grid underlay for hero section */
.hero-grid {
  position: absolute; inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(to right, var(--line) 1px, transparent 1px),
    linear-gradient(to bottom, var(--line) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 900px 500px at 50% 30%, black, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 900px 500px at 50% 30%, black, transparent 70%);
  opacity: 0.55;
}

/* Logos row — full-bleed marquee carousel */
.logos {
  margin-top: 72px;
  margin-left: calc(50% - 50vw);
  margin-right: calc(50% - 50vw);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 40px 0;
  position: relative;
  overflow: hidden;
  mask-image: linear-gradient(90deg, transparent, black 6%, black 94%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, black 6%, black 94%, transparent);
}
.logos .marquee-track {
  display: flex;
  width: max-content;
  gap: 96px;
  align-items: center;
  animation: marquee 50s linear infinite;
  padding-left: 96px;
}
.logos:hover .marquee-track { animation-play-state: paused; }
.logos .logo {
  display: inline-flex; align-items: center; gap: 18px;
  white-space: nowrap;
  color: var(--fg-2);
  opacity: 0.72;
  transition: opacity .25s ease;
}
.logos .logo:hover { opacity: 1; }
.logos .logo img {
  height: 44px;
  width: auto;
  max-width: 80px;
  object-fit: contain;
  filter: none;
}
.logos .logo .logo-mono img {
  filter: brightness(0) invert(1);
}
.logos .logo .name {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--fg);
}
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
/* light theme: invert mono logos back to dark */
html[data-theme="paper"] .logos .logo .logo-mono img {
  filter: none;
}

/* Section */
.section { padding: 96px 0; position: relative; }
.section-head { display: flex; flex-direction: column; gap: 14px; margin-bottom: 48px; max-width: 720px; }
.section-head h2 {
  font-size: clamp(34px, 4.6vw, 56px);
  font-family: var(--font-sans);
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1.02;
  margin: 0;
}
.section-head h2 em { font-family: var(--font-serif); font-style: italic; color: var(--fg-2); font-weight: 400; }
.section-head p { margin: 0; color: var(--fg-3); font-size: 16px; line-height: 1.55; max-width: 560px; }

/* Surface / card */
.surface {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) , var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
}

/* Scan input preview */
.scan-card {
  padding: 0;
  overflow: hidden;
}
.scan-tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  padding: 0 16px;
}
.scan-tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--fg-4);
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
}
.scan-tab[data-active="true"] { color: var(--fg); border-bottom-color: var(--fg); }
.scan-tab svg { width: 14px; height: 14px; }

.scan-body { padding: 28px; display: grid; gap: 18px; }
.scan-input {
  display: flex; align-items: center; gap: 0;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-radius: 10px;
  padding: 4px 4px 4px 14px;
  height: 48px;
  transition: border-color .15s;
}
.scan-input:focus-within { border-color: var(--line-strong); }
.scan-input .prefix { color: var(--fg-4); font-size: 13.5px; font-family: var(--font-mono); }
.scan-input input {
  flex: 1; min-width: 0;
  background: transparent; border: 0; outline: none;
  color: var(--fg); font-family: var(--font-mono); font-size: 13.5px;
  padding: 0 12px;
}
.scan-input .hint { color: var(--fg-5); font-size: 12px; padding-right: 8px; }
.scan-input button { margin-left: 8px; }

.scan-divider {
  display: flex; align-items: center; gap: 12px; color: var(--fg-5); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
}
.scan-divider::before, .scan-divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }

.scan-drop {
  border: 1px dashed var(--line-2);
  border-radius: 10px;
  padding: 22px;
  display: flex; align-items: center; gap: 14px;
  background: rgba(255,255,255,0.015);
}
.scan-drop .icn {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--bg-3); border: 1px solid var(--line);
  display: grid; place-items: center; color: var(--fg-2);
}
.scan-drop .txt { flex: 1; }
.scan-drop .txt b { display: block; font-size: 13.5px; color: var(--fg); font-weight: 500; }
.scan-drop .txt span { font-size: 12.5px; color: var(--fg-4); }

.scan-meta {
  display: flex; gap: 18px; align-items: center;
  color: var(--fg-4); font-size: 12.5px;
}
.scan-meta b { color: var(--fg-2); font-weight: 500; }
.scan-meta svg { width: 14px; height: 14px; }

/* Dashboard preview */
.dash {
  overflow: hidden;
  border-radius: var(--radius-lg);
}
.dash-chrome {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
}
.dash-dots { display: flex; gap: 6px; }
.dash-dots span { width: 10px; height: 10px; border-radius: 50%; background: var(--bg-3); border: 1px solid var(--line-2); }
.dash-url {
  flex: 1;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  background: var(--bg-1); border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--fg-4); font-family: var(--font-mono); font-size: 12px;
}
.dash-url .path { color: var(--fg-2); }

.dash-body {
  display: grid;
  grid-template-columns: 1fr 340px;
  min-height: 560px;
  background: var(--bg-1);
}
.dash-main { padding: 24px; border-right: 1px solid var(--line); }
.dash-side { padding: 20px; background: var(--bg);}

.dash-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 20px; margin-bottom: 22px;
}
.dash-head .title { }
.dash-head .title .crumb { font-size: 12px; color: var(--fg-4); display: flex; align-items: center; gap: 6px; }
.dash-head .title h3 { margin: 6px 0 0; font-size: 20px; letter-spacing: -0.015em; font-weight: 500; }
.dash-head .title h3 .repo { font-family: var(--font-mono); font-size: 15px; color: var(--fg-3); margin-left: 6px; font-weight: 400; }
.dash-head .actions { display: flex; gap: 8px; }

.score-row {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 22px;
}
.score-card {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  background: var(--bg-2);
  display: flex; flex-direction: column; gap: 6px;
}
.score-card .lbl { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-5); }
.score-card .val { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; color: var(--fg); display: flex; align-items: baseline; gap: 6px; }
.score-card .val small { font-size: 12px; color: var(--fg-4); font-weight: 400; }
.score-card .sub { font-size: 12px; color: var(--fg-4); }

.score-card.score-main { background: linear-gradient(180deg, rgba(127,231,196,0.06), rgba(127,231,196,0) 70%), var(--bg-2); }
.score-main .ring {
  align-self: flex-end;
}

.sev-crit .val { color: var(--danger); }
.sev-med .val { color: var(--warn); }
.sev-low .val { color: var(--info); }

/* findings table */
.findings-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.findings-head h4 { margin: 0; font-size: 13px; font-weight: 500; color: var(--fg-2); }
.findings-head .filter { display: flex; gap: 6px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 22px; padding: 0 8px;
  border-radius: 999px;
  border: 1px solid var(--line-2);
  font-size: 11.5px;
  color: var(--fg-3);
}
.chip .n { color: var(--fg-4); }
.chip[data-active="true"] { border-color: var(--line-strong); color: var(--fg); }

.findings {
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg-2);
}
.finding {
  display: grid;
  grid-template-columns: 20px 90px 1fr auto auto;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.finding:last-child { border-bottom: 0; }
.finding:hover { background: rgba(255,255,255,0.02); }

.sev {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  font-weight: 500;
}
.sev .dot { width: 7px; height: 7px; border-radius: 50%; }
.sev-critical .dot { background: var(--danger); box-shadow: 0 0 0 3px var(--danger-soft); }
.sev-critical { color: var(--danger); }
.sev-high .dot { background: #FB923C; box-shadow: 0 0 0 3px rgba(251,146,60,0.15); }
.sev-high { color: #FB923C; }
.sev-medium .dot { background: var(--warn); box-shadow: 0 0 0 3px var(--warn-soft); }
.sev-medium { color: var(--warn); }
.sev-low .dot { background: var(--info); box-shadow: 0 0 0 3px var(--info-soft); }
.sev-low { color: var(--info); }

.finding .msg { color: var(--fg); font-weight: 450; letter-spacing: -0.005em; }
.finding .path { font-family: var(--font-mono); font-size: 12px; color: var(--fg-4); }
.finding .path b { color: var(--fg-2); font-weight: 500; }
.finding .meta { font-size: 12px; color: var(--fg-4); }
.finding .action {
  font-size: 12px; color: var(--accent);
  border: 1px solid var(--line-2);
  padding: 4px 10px; border-radius: 6px;
  background: transparent;
  display: inline-flex; align-items: center; gap: 6px;
}
.finding .action:hover { border-color: rgba(127,231,196,0.35); background: var(--accent-soft); }

.finding .ico {
  width: 18px; height: 18px; display: grid; place-items: center;
  color: var(--fg-4);
}

/* Right side: agent timeline */
.agent-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.agent-head h4 { margin: 0; font-size: 13px; font-weight: 500; color: var(--fg-2); }
.agent-head .live { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--fg-4); }
.agent-head .live .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.6s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.timeline { position: relative; padding-left: 18px; }
.timeline::before {
  content: ""; position: absolute;
  left: 6px; top: 6px; bottom: 6px;
  width: 1px; background: var(--line-2);
}
.tl-item { position: relative; padding: 0 0 18px 0; }
.tl-item::before {
  content: ""; position: absolute;
  left: -18px; top: 6px;
  width: 11px; height: 11px; border-radius: 50%;
  background: var(--bg-1); border: 1px solid var(--line-strong);
}
.tl-item[data-state="done"]::before { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.tl-item[data-state="active"]::before {
  background: var(--bg-1);
  border-color: var(--accent);
  animation: pulse 1.6s infinite;
}
.tl-item .tl-title { font-size: 13px; color: var(--fg); font-weight: 500; letter-spacing: -0.005em; }
.tl-item .tl-sub { margin-top: 3px; font-size: 12px; color: var(--fg-4); line-height: 1.45; }
.tl-item .tl-time { margin-top: 3px; font-size: 11px; color: var(--fg-5); font-family: var(--font-mono); }
.tl-item .tl-code {
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  padding: 8px 10px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--fg-3);
  white-space: pre-wrap;
  line-height: 1.5;
}
.tl-item .tl-code .k { color: var(--accent); }
.tl-item .tl-code .c { color: var(--fg-5); }

/* Features grid */
.features {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.feature {
  background: var(--bg-1);
  padding: 28px;
  min-height: 260px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative;
}
.feature.f-wide { grid-column: span 6; }
.feature.f-narrow { grid-column: span 6; }
.feature.f-third { grid-column: span 4; }
.feature.f-two-third { grid-column: span 8; }
.feature .f-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  display: grid; place-items: center; color: var(--fg-2);
}
.feature h3 { margin: 0; font-size: 18px; font-weight: 500; letter-spacing: -0.015em; }
.feature p { margin: 0; color: var(--fg-3); font-size: 14px; line-height: 1.55; max-width: 520px; }
.feature .f-art { margin-top: auto; }

/* art: risk list in feature */
.mini-list { display: grid; gap: 6px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); }
.mini-list .row { display: flex; align-items: center; gap: 10px; padding: 6px 10px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; }
.mini-list .row .dot { width: 6px; height: 6px; border-radius: 50%; }

.diff {
  font-family: var(--font-mono); font-size: 12px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  line-height: 1.6;
  color: var(--fg-3);
}
.diff .del { color: #FCA5A5; background: rgba(239,68,68,0.08); display: block; padding: 0 6px; margin: 0 -6px; }
.diff .add { color: #86EFAC; background: rgba(34,197,94,0.08); display: block; padding: 0 6px; margin: 0 -6px; }
.diff .c { color: var(--fg-5); }

.share-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px;
  display: flex; align-items: center; gap: 12px;
}
.share-card .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #a78bfa, #7FE7C4); }
.share-card .txt { flex: 1; font-size: 13px; color: var(--fg-2); }
.share-card .txt small { display: block; color: var(--fg-4); font-size: 11.5px; font-family: var(--font-mono); margin-top: 2px; }

/* How it works */
.howit {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.step {
  background: var(--bg-1);
  padding: 28px 24px 32px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative;
}
.step .num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-5);
  letter-spacing: 0.16em;
}
.step h4 { margin: 0; font-size: 17px; font-weight: 500; letter-spacing: -0.015em; }
.step p { margin: 0; color: var(--fg-3); font-size: 13.5px; line-height: 1.55; }
.step .ico {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--bg-2); border: 1px solid var(--line);
  display: grid; place-items: center; color: var(--fg);
  margin-bottom: 2px;
}

/* ============ Closing: oversized gradient footer ============ */
.closing {
  position: relative;
  margin-top: 80px;
  padding-top: 100px;
  overflow: hidden;
  border-top: 1px solid var(--line);
  background:
    radial-gradient(80% 70% at 50% 0%, var(--accent-soft), transparent 60%),
    radial-gradient(60% 50% at 80% 20%, rgba(127,231,196,0.06), transparent 60%),
    radial-gradient(60% 80% at 20% 40%, rgba(127,231,196,0.04), transparent 60%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-1) 40%, var(--bg) 100%);
}
.closing::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, var(--line) 1px, transparent 1px),
    linear-gradient(to bottom, var(--line) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: radial-gradient(ellipse 900px 500px at 50% 0%, black, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 900px 500px at 50% 0%, black, transparent 70%);
  opacity: 0.35;
  pointer-events: none;
}

.closing-cta {
  position: relative;
  text-align: center;
  padding: 0 24px 80px;
  max-width: 820px;
  margin: 0 auto;
}
.closing-cta .eyebrow { margin-bottom: 18px; display: inline-block; }
.closing-cta h2 {
  font-size: clamp(44px, 7vw, 88px);
  margin: 0 0 20px;
  font-family: var(--font-sans);
  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 0.98;
}
.closing-cta h2 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--fg-2); }
.closing-cta p {
  margin: 0 auto 32px;
  color: var(--fg-3);
  max-width: 520px;
  font-size: 17px;
  line-height: 1.55;
}
.closing-cta .cta-actions {
  display: inline-flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}

/* footer inside closing */
.footer {
  position: relative;
  padding: 72px 0 0;
  color: var(--fg-4);
  font-size: 13px;
}
.footer-inner {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 0 32px;
  display: grid;
  grid-template-columns: 1.2fr 2fr;
  gap: 60px;
}
.footer-brand { display: flex; flex-direction: column; gap: 18px; max-width: 320px; }
.footer-brand .brand { font-size: 16px; }
.footer-brand p { margin: 0; line-height: 1.6; color: var(--fg-3); font-size: 13.5px; }
.footer-brand .status {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--fg-3);
  padding: 6px 10px;
  border: 1px solid var(--line-2);
  border-radius: 999px;
  width: fit-content;
  background: rgba(255,255,255,0.02);
}
.footer-brand .status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.footer .cols {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.footer .col h5 { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-5); margin: 0 0 14px; font-weight: 500; }
.footer .col a { display: block; color: var(--fg-3); padding: 5px 0; transition: color .15s; }
.footer .col a:hover { color: var(--fg); }

.footer-bottom {
  position: relative;
  margin-top: 72px;
  padding: 20px 32px 28px;
  max-width: var(--maxw);
  margin-left: auto; margin-right: auto;
  border-top: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
  font-size: 12px; color: var(--fg-5);
}
.footer-bottom .safe { display: inline-flex; align-items: center; gap: 8px; color: var(--fg-3); }
.footer-bottom .socials { display: inline-flex; gap: 6px; }
.footer-bottom .socials a {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--line-2);
  display: inline-grid; place-items: center;
  color: var(--fg-3);
  transition: all .15s;
}
.footer-bottom .socials a:hover { border-color: var(--line-strong); color: var(--fg); background: rgba(255,255,255,0.03); }
.footer-bottom .socials a svg { width: 14px; height: 14px; }

/* oversized wordmark */
.wordmark {
  position: relative;
  max-width: var(--maxw);
  margin: 80px auto 0;
  padding: 0 32px 40px;
  font-family: var(--font-sans);
  font-weight: 500;
  letter-spacing: -0.06em;
  font-size: clamp(90px, 18vw, 260px);
  line-height: 0.85;
  color: transparent;
  background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.01) 80%);
  -webkit-background-clip: text;
  background-clip: text;
  text-align: center;
  pointer-events: none;
  user-select: none;
  overflow: hidden;
}
.wordmark em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.04em;
}

@media (max-width: 880px) {
  .footer-inner { grid-template-columns: 1fr; gap: 40px; }
  .footer .cols { grid-template-columns: 1fr 1fr; }
}

/* Disclaimer */
.disclaim {
  margin-top: 18px; padding: 14px 16px;
  border: 1px dashed var(--line-2);
  border-radius: 10px;
  color: var(--fg-4); font-size: 12.5px; line-height: 1.55;
  background: rgba(255,255,255,0.015);
  display: flex; gap: 10px; align-items: flex-start;
  max-width: 680px;
}
.disclaim svg { flex-shrink: 0; margin-top: 2px; }

/* small screens */
@media (max-width: 880px) {
  .dash-body { grid-template-columns: 1fr; }
  .dash-main { border-right: 0; border-bottom: 1px solid var(--line); }

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "white",
      "theme": "ink",
      "wide": false
    }/*EDITMODE-END*/;

    function Root() {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      return (
        <>
          <App tweaks={tweaks} />
          <window.TweaksPanel>
            <window.TweakSection label="Accent" />
            <window.TweakRadio label="Color" value={tweaks.accent}
              onChange={(v) => setTweak("accent", v)}
              options={[
                { value: "mint", label: "Mint" },
                { value: "lime", label: "Lime" },
                { value: "cyan", label: "Cyan" },
                { value: "violet", label: "Violet" },
                { value: "amber", label: "Amber" },
                { value: "white", label: "Mono" },
              ]} />
            <window.TweakSection label="Theme" />
            <window.TweakRadio label="Palette" value={tweaks.theme}
              onChange={(v) => setTweak("theme", v)}
              options={[
                { value: "ink", label: "Ink" },
                { value: "slate", label: "Slate" },
                { value: "paper", label: "Paper" },
              ]} />
            <window.TweakSection label="Layout" />
            <window.TweakToggle label="Wide container" value={tweaks.wide}
              onChange={(v) => setTweak("wide", v)} />
          </window.TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
